<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 435 60'
    style='background-color: #00000000;'
    width='435px' height='60px'>

    <style>
@font-face {
  font-family: 'Fira Code';
  font-style: normal;
  font-weight: 400;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Multiline -->
                                <animate id='d0' attributeName='d' begin='0s;d1.end'
                    dur='6000ms' fill="freeze"
                    values='m0,25 h0 ; m0,25 h0 ; m0,25 h435 ; m0,25 h435' keyTimes='0;0;0.83333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#078DF7' font-size='20'
        dominant-baseline='auto'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            Always against the current,
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Multiline -->
                                <animate id='d1' attributeName='d' begin='0s;d1.end'
                    dur='12000ms' fill="freeze"
                    values='m0,50 h0 ; m0,50 h0 ; m0,50 h435 ; m0,50 h435' keyTimes='0;0.5;0.91666666666667;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#078DF7' font-size='20'
        dominant-baseline='auto'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
        <textPath xlink:href='#path1'>
            but always towards the source.
        </textPath>
    </text>
</svg>
